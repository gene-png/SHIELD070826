[tool.ruff]
target-version = "py312"
line-length = 100
extend-exclude = [".venv", "node_modules", "reference-docs"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "S", "ASYNC", "C4", "SIM"]
# TCH (type-checking-block) deliberately omitted: SQLAlchemy 2's
# Mapped[uuid.UUID] / Mapped[datetime] annotations need their referent
# types resolvable at runtime, which conflicts with moving stdlib imports
# into TYPE_CHECKING blocks.
ignore = ["S101"]  # assert in tests is fine

[tool.ruff.lint.per-file-ignores]
"**/tests/**" = ["S105", "S106", "S107", "E501"]  # hardcoded creds + long signatures OK in tests
"**/alembic/env.py" = ["E402"]  # late import is intentional (registers models against metadata)
"**/alembic/versions/**" = ["E501", "S608"]  # migration headers exceed 100 chars; raw-SQL data migrations are intentional
"**/scripts/**" = ["E501", "S105", "S106", "S108", "S608"]  # dev/seed scripts: demo creds, /tmp paths, and raw SQL are fine
"**/csf/catalog.py" = ["E501"]  # NIST CSF 2.0 outcome statements are prose that exceeds 100 chars
"**/zt/catalog.py" = ["E501"]   # CISA ZTMM + DoD ZTRA outcome statements are prose that exceeds 100 chars
"**/attack/catalog.py" = ["E501"]  # MITRE ATT&CK matrix is wide reference data; tactic-alias comments exceed 100 chars
# HTML report templates: markup embedded in f-strings reads worse when wrapped,
# and black won't split string literals, so these can't be formatted away.
"**/tech_debt/exporters.py" = ["E501"]
"**/zt/exporters.py" = ["E501"]

[tool.black]
line-length = 100
target-version = ["py312"]

[tool.mypy]
python_version = "3.12"
strict = true
warn_unreachable = true
warn_unused_ignores = true
exclude = ["reference-docs", ".venv", "node_modules"]

[tool.pytest.ini_options]
testpaths = ["apps/api/tests"]
markers = [
    "unit: fast in-process tests",
    "integration: tests that hit a real database",
    "e2e: end-to-end via running services",
]
addopts = "-ra -q"

[tool.bandit]
exclude_dirs = ["reference-docs", ".venv", "node_modules", "tests"]
# B108: dev-only "/tmp" storage fallback (prod always sets s3_endpoint_url).
# B310: urlopen on URLs our own StorageBackend signs. Both are documented at the
# call sites (app/storage/factory.py, app/tech_debt/extract.py) with ruff noqa.
skips = ["B108", "B310"]
