name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  python:
    name: Python (ruff + black + pytest + bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install API + dev tools
        working-directory: apps/api
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install bandit pip-audit

      - name: ruff check
        working-directory: apps/api
        run: ruff check .

      - name: black --check
        working-directory: apps/api
        run: black --check .

      - name: pytest -m unit
        working-directory: apps/api
        run: pytest -m unit tests/unit

      - name: bandit
        run: bandit -q -c pyproject.toml -r apps/api/app

      # Work Order F: dependency audit. Surfaces advisories; Dependabot opens the
      # fix PRs, so this reports without blocking on a freshly-published CVE.
      - name: pip-audit
        working-directory: apps/api
        continue-on-error: true
        run: pip-audit

  web:
    name: Web (prettier + eslint + typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # No `version:` here on purpose — the pnpm version is pinned by the
      # `packageManager` field in package.json. Specifying both makes
      # action-setup fail with ERR_PNPM_BAD_PM_VERSION.
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      # Work Order F: dependency audit (Dependabot opens the fix PRs).
      - name: pnpm audit
        continue-on-error: true
        run: pnpm audit --audit-level high

      - name: prettier --check
        run: pnpm format:check

      - name: eslint
        run: pnpm -F web lint

      - name: tsc --noEmit
        run: pnpm -F web typecheck

      - name: next build
        env:
          NEXTAUTH_SECRET: ci-only-not-a-real-secret-1234567890
          API_BASE_URL: http://localhost:8000
        run: pnpm -F web build

  e2e:
    name: E2E (Playwright, composed stack)
    runs-on: ubuntu-latest
    # Sprint 0 lands this non-blocking so a harness hiccup cannot wedge the
    # first remediation PRs. Flip to blocking once it has run green for a
    # full sprint (tracked in FABLE_REMEDIATION_PLAN.md, Sprint 1 exit).
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7

      # Fixture mode: no ANTHROPIC_API_KEY is available to CI, and none is
      # needed. The live smoke test (tests/live) stays skipped.
      - name: Bring up the stack
        env:
          SHIELD_LLM_MODE: fixture
        run: docker compose up -d --wait db redis minio createbuckets api web

      - name: Seed the demo tenant
        run: docker compose exec -T api python scripts/seed_demo.py

      - name: Run Playwright
        env:
          CI: "true"
        run: docker compose --profile test run --rm playwright

      - name: Dump API logs on failure
        if: failure()
        run: docker compose logs --no-color --tail=200 api web

      - name: Upload traces, screenshots, video
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            e2e/test-results/
            e2e/playwright-report/
          retention-days: 7
          if-no-files-found: ignore

      - name: Tear down
        if: always()
        run: docker compose --profile test down -v

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
