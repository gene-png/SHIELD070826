name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  python:
    name: Python (ruff + black + pytest + bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install API + dev tools
        working-directory: apps/api
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install bandit pip-audit

      - name: ruff check
        working-directory: apps/api
        run: ruff check .

      - name: black --check
        working-directory: apps/api
        run: black --check .

      - name: pytest -m unit
        working-directory: apps/api
        run: pytest -m unit tests/unit

      - name: bandit
        run: bandit -q -c pyproject.toml -r apps/api/app

      # Work Order F: dependency audit. Surfaces advisories; Dependabot opens the
      # fix PRs, so this reports without blocking on a freshly-published CVE.
      - name: pip-audit
        working-directory: apps/api
        continue-on-error: true
        run: pip-audit

  web:
    name: Web (prettier + eslint + typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # No `version:` here on purpose — the pnpm version is pinned by the
      # `packageManager` field in package.json. Specifying both makes
      # action-setup fail with ERR_PNPM_BAD_PM_VERSION.
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      # Work Order F: dependency audit (Dependabot opens the fix PRs).
      - name: pnpm audit
        continue-on-error: true
        run: pnpm audit --audit-level high

      - name: prettier --check
        run: pnpm format:check

      - name: eslint
        run: pnpm -F web lint

      - name: tsc --noEmit
        run: pnpm -F web typecheck

      - name: next build
        env:
          NEXTAUTH_SECRET: ci-only-not-a-real-secret-1234567890
          API_BASE_URL: http://localhost:8000
        run: pnpm -F web build

  e2e:
    name: E2E (Playwright, composed stack)
    runs-on: ubuntu-latest
    # Sprint B fixes the two reasons this job could never reach the specs: the
    # job-level NEXTAUTH_URL below, and --no-deps on the run step. Kept
    # non-blocking until the FIRST hosted run is observed green (the specs pass
    # three runs in a row locally against the exact command sequence below); a
    # follow-up commit flips continue-on-error off once that is confirmed.
    continue-on-error: true
    env:
      # Every step (up AND run) must see the SAME NEXTAUTH_URL, and it must equal
      # the origin the browser uses inside the compose network (web:3000), or
      # NextAuth rejects the credentials callback. This is set HERE, on the job,
      # NOT as the compose default in docker-compose.yml — that default is
      # http://localhost:3000, which is correct for a human on the host.
      NEXTAUTH_URL: http://web:3000
      # Fixture mode: no ANTHROPIC_API_KEY is available to CI, and none is
      # needed. The live smoke test (tests/live) stays skipped. Fixture-mode AI
      # actually works in the app as of X-8 (Sprint A), so the run-ai specs pass.
      SHIELD_LLM_MODE: fixture
    steps:
      - uses: actions/checkout@v7

      - name: Bring up the stack
        run: docker compose up -d --wait db redis minio createbuckets api web

      - name: Seed the demo tenant
        run: docker compose exec -T api python scripts/seed_demo.py

      # --no-deps: the stack is already up with the correct NEXTAUTH_URL. Without
      # it, `compose run` re-creates the web service from its current config and
      # can drop the override, silently reverting sign-in to the broken state.
      - name: Run Playwright
        env:
          CI: "true"
        run: docker compose --profile test run --rm --no-deps playwright

      - name: Dump API logs on failure
        if: failure()
        run: docker compose logs --no-color --tail=200 api web

      - name: Upload traces, screenshots, video
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            e2e/test-results/
            e2e/playwright-report/
          retention-days: 7
          if-no-files-found: ignore

      - name: Tear down
        if: always()
        run: docker compose --profile test down -v

  restore-drill:
    name: Restore drill (backup/restore round-trip)
    runs-on: ubuntu-latest
    # Non-blocking for its first sprint, like the e2e job: a harness hiccup must
    # not wedge remediation PRs. Flip to blocking once it has run green for a
    # full sprint. Proves infra/backup/{backup,restore}.sh actually round-trip a
    # seeded record + artifact against the compose stack, using a scratch DB and
    # scratch bucket (never the real volumes).
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7

      - name: Bring up db + minio
        run: docker compose up -d --wait db minio

      - name: Run restore drill
        run: bash infra/backup/restore-drill.sh

      - name: Tear down
        if: always()
        run: docker compose down -v

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
